<style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Top Navigation Bar (Shared Component Reference) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 bg-transparent backdrop-blur-sm transition-all duration-300">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white text-2xl cursor-pointer p-2 hover:bg-white/10 rounded-full transition-colors">menu</span>
<h1 class="font-headline-md text-headline-md text-white tracking-tight">Tangier</h1>
</div>
<div class="w-10 h-10 rounded-full border-2 border-white/30 overflow-hidden cursor-pointer hover:scale-105 transition-transform">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3KvkzvmStJfJUniNjS_LgDyt9pNXg46qzS8vxsBI4AN8d2-0UD41EDolt9hqqOmTveNAM9-smAiFTy-kSjQ9-trsZL2x1J1SC_Jnaz-rlEvt8N8VVu8FNVoPVbTm88y24IjzD7duqNJRntw6xc9V6n8NeOiIi1EaMLXomH8Puj292EWfAvMUi7clcGkBBCprvl58BNYLfeAhjgavL702Lya8JuhqsRqCLKWU7dVA7VA9LRz7g42NB-gbajtpj9QO27eh9kwzBXI0"/>
</div>
</header>
<!-- Full Screen Hero Canvas -->
<main class="relative h-screen w-full overflow-hidden flex flex-col items-center justify-end">
<!-- Hero Background Image -->
<div class="absolute inset-0 z-0 scale-105 transform transition-transform duration-[10000ms]" id="hero-image-container">
<img class="w-full h-full object-cover" data-alt="A cinematic wide shot of the Tangier Kasbah at sunset, overlooking the Strait of Gibraltar. The ancient sandstone architecture glows in deep oranges and golden terracotta as the Mediterranean sun dips below the horizon. The sky is a gradient of violet and soft peach, with the deep blue Atlantic and Mediterranean waters meeting in the distance. The atmosphere is serene, artisanal, and sophisticated, reflecting a Mediterranean Bohemian aesthetic with high-key warmth and soft, diffused light." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8iKfLu8n5mm4bayIMOZvQogMmdeR1NLGkFKgHvlnKJt_ourWgDu2H0enWjPhhLv67gwsT3B7BYl1_QUO_HuB1fGA-Z4IiQF6cCTxhub9VRPE1HwbaPxIk8c7lB5w5scKdcjMqioaFkLM4_Scu79Ij6-cfEGKSjs77oPAtPBHoYglYVP1hRdhUqx688Yh5VjoblUi_oLxgtS2meJiQHTz2EookdC3v87gIpNs5GbO9cAgCBG1rv_0QNDH1K0dohPhgxmowF7jM7ug"/>
<div class="absolute inset-0 hero-gradient"></div>
</div>
<!-- Poetic Greeting & Content -->
<div class="relative z-10 w-full px-margin-mobile md:px-margin-desktop mb-24 md:mb-32 text-center md:text-left flex flex-col items-center md:items-start max-w-5xl mx-auto">
<div class="mb-6 opacity-0 translate-y-10 transition-all duration-1000 ease-out" id="poetic-subhead">
<span class="inline-block py-1 px-4 rounded-full bg-tertiary-fixed text-on-tertiary-fixed-variant font-label-md text-label-md uppercase tracking-widest">
                    The Bride of the North
                </span>
</div>
<h2 class="font-headline-xl text-headline-xl text-white mb-8 max-w-3xl leading-tight opacity-0 translate-y-10 transition-all duration-1000 delay-300 ease-out" id="main-headline">
                Where the Mediterranean meets the Atlantic.
            </h2>
<div class="flex flex-col md:flex-row gap-6 items-center opacity-0 translate-y-10 transition-all duration-1000 delay-500 ease-out w-full md:w-auto" id="hero-actions">
<!-- Primary Action -->
<button class="w-full md:w-auto group relative overflow-hidden px-10 py-5 bg-primary text-on-primary rounded-full font-label-md text-label-md shadow-lg transition-all duration-300 hover:scale-[1.02] hover:shadow-primary/20 active:scale-95">
<span class="relative z-10 flex items-center justify-center gap-2">
                        Explore Tangier
                        <span class="material-symbols-outlined">arrow_forward</span>
</span>
<div class="absolute inset-0 bg-primary-container translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
</button>
<!-- Secondary Action -->
<button class="w-full md:w-auto px-10 py-5 bg-white/10 backdrop-blur-md text-white border border-white/30 rounded-full font-label-md text-label-md transition-all hover:bg-white/20 active:scale-95">
                    Plan Your Visit
                </button>
</div>
</div>
<!-- Atmospheric Scroll Indicator -->
<div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 animate-bounce cursor-pointer flex flex-col items-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
<span class="font-label-sm text-label-sm text-white uppercase tracking-widest">Discover</span>
<span class="material-symbols-outlined text-white">keyboard_double_arrow_down</span>
</div>
<!-- Decorative Zellige Accent -->
<div class="absolute bottom-0 left-0 w-full h-2 z-20 zellige-pattern opacity-30"></div>
</main>
<!-- Shared Bottom Nav (Mobile Only) - Suppression Logic Applied: Hidden on Splash/Hero screens -->
<!-- Hidden via layout decision for "Splash/Welcome" journey as per mandate -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Animation Trigger on Mount
            const subhead = document.getElementById('poetic-subhead');
            const headline = document.getElementById('main-headline');
            const actions = document.getElementById('hero-actions');
            const heroImage = document.getElementById('hero-image-container');

            setTimeout(() => {
                subhead.classList.remove('opacity-0', 'translate-y-10');
                headline.classList.remove('opacity-0', 'translate-y-10');
                actions.classList.remove('opacity-0', 'translate-y-10');
                heroImage.classList.remove('scale-105');
            }, 300);

            // Subtle interaction: Parallax movement of hero on mouse move
            if (window.innerWidth > 768) {
                document.addEventListener('mousemove', (e) => {
                    const x = (e.clientX - window.innerWidth / 2) / 100;
                    const y = (e.clientY - window.innerHeight / 2) / 100;
                    heroImage.style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
                });
            }

            // Scroll interaction for Header
            const header = document.querySelector('header');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    header.classList.add('bg-surface-container-low/95', 'backdrop-blur-xl', 'shadow-md');
                    header.querySelector('h1').classList.remove('text-white');
                    header.querySelector('h1').classList.add('text-primary');
                    header.querySelector('.material-symbols-outlined').classList.remove('text-white');
                    header.querySelector('.material-symbols-outlined').classList.add('text-primary');
                } else {
                    header.classList.remove('bg-surface-container-low/95', 'backdrop-blur-xl', 'shadow-md');
                    header.querySelector('h1').classList.add('text-white');
                    header.querySelector('h1').classList.remove('text-primary');
                    header.querySelector('.material-symbols-outlined').classList.add('text-white');
                    header.querySelector('.material-symbols-outlined').classList.remove('text-primary');
                }
            });
        });
    </script>
</body></html>
