<body class="bg-background min-h-screen flex flex-col font-body-md text-on-surface selection:bg-secondary-container">

<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">

<div class="absolute -top-24 -right-24 w-96 h-96 bg-secondary-container/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-0 -left-24 w-80 h-80 bg-primary/10 rounded-full blur-3xl"></div>

<!-- Main Content -->
<main class="relative z-10 flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-12">
<div class="w-full max-w-md">
<!-- Logo & Welcome Section -->
<header class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-6">
<span class="font-headline-xl text-headline-xl text-primary tracking-tight">Tangier</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Experience the Bride of the North</p>
</header>
<!-- Login Form Card -->
<div class="glass-card rounded-xl p-8 shadow-[0_8px_30px_rgb(227,142,73,0.12)] border border-surface-variant/30">
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3.5 focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-300 shadow-sm outline-none group-hover:shadow-md" id="email" name="email" placeholder="marhaba@tangier.com" type="email"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3.5 focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-300 shadow-sm outline-none group-hover:shadow-md" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-lg shadow-lg hover:shadow-xl active:scale-[0.98] transition-all duration-300 border-b-2 border-primary-container" type="submit">
                        Sign In
                    </button>
<!-- Divider -->
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm">

<span class="font-label-md text-label-md text-on-surface">Google</span>

<div class="absolute inset-0 bg-gradient-to-r from-background via-background/40 to-transparent"></div>

<div class="absolute top-1/2 left-0 -translate-y-1/2 w-32 h-64 opacity-20 border-r-4 border-secondary/30 zellige-pattern rotate-12"></div>
</div>
</div>
<script>
        // Micro-interactions for form inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.glass-card').style.transform = 'translateY(-2px)';
                input.parentElement.closest('.glass-card').style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('.glass-card').style.transform = 'translateY(0)';
            });
        });

        // Simple visibility toggle logic
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                toggleBtn.children[0].textContent = isPass ? 'visibility_off' : 'visibility';
            });
        }
    </script>
